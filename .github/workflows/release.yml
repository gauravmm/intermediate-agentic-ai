name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: typst-community/setup-typst@v5
      - run: typst compile slides.typ slides.pdf
      - uses: actions/upload-artifact@v6
        with:
          name: intermediate-agentic-ai-slides
          path: slides.pdf
          retention-days: 1

  release:
    needs: [compile]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "name=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "name=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          fi
      - name: Stage release assets
        run: cp artifacts/intermediate-agentic-ai-slides/slides.pdf intermediate-agentic-ai-slides.pdf
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Release ${{ steps.tag.outputs.name }}
          body: Compiled slide deck for ${{ steps.tag.outputs.name }}
          fail_on_unmatched_files: true
          files: |
            intermediate-agentic-ai-slides.pdf
